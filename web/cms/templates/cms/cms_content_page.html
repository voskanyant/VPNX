{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<article class="section-card">
  <h1 class="h2 mb-2">{{ page.title }}</h1>
  {% if page.intro %}
    <div class="text-secondary mb-3">{{ page.intro|richtext }}</div>
  {% endif %}
  {% if page.body %}
    <div class="post-content">{{ page.body|richtext }}</div>
  {% endif %}
</article>
{% endblock %}
