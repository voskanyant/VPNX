name: Deploy VXcloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vxcloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /srv/apps/vxcloud/app
            git fetch origin main
            git reset --hard origin/main
            if [[ ! -f .env && -f /srv/secrets/vxcloud.env ]]; then
              cp /srv/secrets/vxcloud.env .env
              chmod 600 .env
            fi

            docker compose --env-file .env build wordpress web
            docker compose --env-file .env up -d db wpdb
            docker compose --env-file .env up -d wordpress web proxy
            docker compose --env-file .env stop haproxy bot || true
            docker compose --env-file .env up -d proxy

            docker compose --env-file .env exec -T web python /app/web/manage.py makemigrations --check --dry-run

            max_attempts=45
            healthy=0
            for attempt in $(seq 1 "$max_attempts"); do
              if curl -fsS -o /dev/null http://127.0.0.1:8088/ops/login/?next=/ops/; then
                healthy=1
                break
              fi
              sleep 2
            done

            if [[ "$healthy" -ne 1 ]]; then
              echo "ERROR: local proxy healthcheck failed"
              docker compose --env-file .env ps
              docker compose --env-file .env logs --tail=100 web proxy
              exit 1
            fi

            docker compose --env-file .env ps
