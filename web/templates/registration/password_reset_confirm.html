{% extends 'base.html' %}

{% block title %}Новый пароль - VXcloud{% endblock %}

{% block content %}
<article class="section-card" style="max-width:560px;">
  <h1 class="h2 mb-3">Новый пароль</h1>
  {% if validlink %}
    <form method="post" class="vstack gap-3">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Сохранить пароль</button>
    </form>
  {% else %}
    <p class="mb-0">Ссылка недействительна или устарела. Запросите восстановление снова.</p>
  {% endif %}
</article>
{% endblock %}
