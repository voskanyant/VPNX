name: Deploy VPnBot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vpnbot
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/vpnbot
            git pull --ff-only origin main
            /opt/vpnbot/.venv/bin/pip install -r requirements.txt
            DATABASE_URL="$(grep -E '^DATABASE_URL=' /opt/vpnbot/.env | sed 's/^DATABASE_URL=//')"
            if [ -z "${DATABASE_URL}" ]; then
              echo "DATABASE_URL is missing in /opt/vpnbot/.env"
              exit 1
            fi
            psql "$DATABASE_URL" -f /opt/vpnbot/sql/schema.sql
            /opt/vpnbot/.venv/bin/python /opt/vpnbot/scripts/sync_directus.py \
              --env-file /opt/vpnbot/.env \
              --buttons-file /opt/vpnbot/directus_seed/bot_buttons.json \
              --content-file /opt/vpnbot/directus_seed/bot_content.json
            systemctl restart vpnbot
            systemctl --no-pager --full status vpnbot | head -n 30
