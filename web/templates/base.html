{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}VXcloud Guide{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'site.css' %}" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="/" class="brand">VXcloud</a>
      <nav class="side-nav">
        <a href="/" class="side-link{% if request.path == '/' %} is-active{% endif %}">Инструкции</a>
        <a href="/account/" class="side-link{% if request.path|slice:':9' == '/account/' %} is-active{% endif %}">Личный кабинет</a>
      </nav>
    </aside>
    <main class="content-area">
      <div class="content-shell">
        {% if messages %}
          <section class="alert-wrap mb-2">
            {% for message in messages %}
              <div class="alert alert-info py-2">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script>
    document.querySelectorAll('input, select, textarea').forEach((el) => {
      if (el.type === 'checkbox' || el.type === 'radio') return;
      el.classList.add('form-control');
    });
    document.querySelectorAll('button[type="submit"], button.btn').forEach((el) => {
      el.classList.add('btn', 'btn-primary');
    });
    // Hard guard: keep only allowed sidebar links.
    const allowedLinks = new Set(['/', '/account/']);
    document.querySelectorAll('.side-nav a').forEach((el) => {
      const href = (el.getAttribute('href') || '').trim();
      if (!allowedLinks.has(href)) el.remove();
    });
  </script>
</body>
</html>
