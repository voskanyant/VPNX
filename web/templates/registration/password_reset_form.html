{% extends 'base.html' %}

{% block title %}Восстановление пароля - VXcloud{% endblock %}

{% block content %}
<article class="section-card" style="max-width:560px;">
  <h1 class="h2 mb-3">Восстановление пароля</h1>
  <p class="text-secondary">Введите email, указанный при регистрации. Мы отправим ссылку для сброса пароля.</p>
  <form method="post" class="vstack gap-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Отправить ссылку</button>
  </form>
</article>
{% endblock %}
